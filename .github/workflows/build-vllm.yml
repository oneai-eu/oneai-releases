name: Build OneStack vLLM Image

on:
  workflow_dispatch:
    inputs:
      vllm_version:
        description: 'vLLM version tag (e.g., v0.17.1)'
        required: true
        default: 'v0.17.1'
      push:
        description: 'Push image to GHCR?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oneai-eu/onestack-vllm

jobs:
  build-and-push:
    name: Build vLLM + orjson
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/vllm
          push: ${{ inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.vllm_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VLLM_VERSION=${{ inputs.vllm_version }}
          labels: |
            org.opencontainers.image.base=vllm/vllm-openai:${{ inputs.vllm_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
